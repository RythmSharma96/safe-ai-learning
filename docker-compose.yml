services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jurneego
      POSTGRES_USER: jurneego
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurneego"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_flag_categories &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DATABASE_URL=postgres://jurneego:${DB_PASSWORD:-localdev}@db:5432/jurneego
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      - AI_ADAPTER=${AI_ADAPTER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - SAFETY_USE_OPENAI_MODERATION=${SAFETY_USE_OPENAI_MODERATION:-false}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
